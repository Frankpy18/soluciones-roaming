<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soluciones Integrales Roaming</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f5f1;
    --surface: #ffffff;
    --surface2: #f4f9f5;
    --border: #d4e6d8;
    --accent: #1a7a3c;
    --accent2: #145f2e;
    --accent3: #27ae60;
    --success: #10b981;
    --text: #1a2e1e;
    --text-muted: #5a7360;
    --motivo-active: #1a7a3c;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    border-bottom: 1px solid var(--accent2);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: #ffffff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Roboto', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #ffffff;
  }

  header p {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.9);
    margin-top: 2px;
  }

  .container {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    height: calc(100vh - 89px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
  }

  .sidebar-label {
    font-family: 'Roboto', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 12px;
  }

  .motivo-btn {
    width: 100%;
    text-align: left;
    padding: 14px 16px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.4;
  }

  .motivo-btn .num {
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(26,122,60,0.08);
    border-radius: 6px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .motivo-btn:hover {
    background: rgba(26,122,60,0.06);
    border-color: rgba(26,122,60,0.2);
    color: var(--text);
  }

  .motivo-btn.active {
    background: rgba(26,122,60,0.08);
    border-color: rgba(26,122,60,0.35);
    color: var(--accent);
  }

  .motivo-btn.active .num {
    background: var(--accent);
    color: #ffffff;
  }

  /* MAIN CONTENT */
  .main {
    overflow-y: auto;
    padding: 32px 40px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
  }

  .empty-icon {
    font-size: 56px;
    opacity: 0.4;
  }

  .empty-state h2 {
    font-family: 'Roboto', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    opacity: 0.6;
  }

  .detail-view { animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    margin-bottom: 28px;
  }

  .detail-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(26,122,60,0.08);
    border: 1px solid rgba(26,122,60,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    margin-bottom: 12px;
  }

  .detail-header h2 {
    font-family: 'Roboto', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 16px;
  }

  .info-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .info-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-muted);
    max-width: 100%;
  }

  .info-chip .icon { font-size: 15px; }

  /* PASO 1 */
  .paso1-box {
    background: rgba(26,122,60,0.06);
    border: 1px solid rgba(26,122,60,0.2);
    border-left: 4px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .paso1-box strong {
    display: block;
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Roboto', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* SOLUTIONS */
  .solutions-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .solution-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .solution-card:hover { border-color: rgba(26,122,60,0.35); }

  .solution-toggle {
    width: 100%;
    background: var(--surface2);
    border: none;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background 0.2s;
    color: var(--text);
  }

  .solution-toggle:hover { background: rgba(26,122,60,0.06); }
  .solution-toggle.open { background: rgba(26,122,60,0.08); }

  .sol-badge {
    background: var(--accent);
    color: white;
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .sol-badge.gestion {
    background: #1a2e1e;
  }

  .sol-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    line-height: 1.4;
  }

  .sol-arrow {
    font-size: 18px;
    transition: transform 0.3s;
    color: var(--text-muted);
  }

  .solution-toggle.open .sol-arrow { transform: rotate(90deg); }

  .solution-body {
    display: none;
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .solution-body.open { display: block; animation: slideDown 0.2s ease; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* RECOMENDACION */
  .rec-card {
    border: 1px solid rgba(15, 199, 138, 0.3);
    background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(0,212,255,0.04));
    border-radius: var(--radius);
    overflow: hidden;
  }

  .rec-toggle {
    width: 100%;
    background: transparent;
    border: none;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--text);
    transition: background 0.2s;
  }

  .rec-toggle:hover { background: rgba(16,185,129,0.08); }
  .rec-toggle.open { background: rgba(16,185,129,0.1); }

  .rec-icon {
    background: linear-gradient(135deg, var(--success), #059669);
    color: white;
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 6px;
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }

  .rec-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--success);
    flex: 1;
  }

  .rec-body {
    display: none;
    padding: 16px 20px;
    border-top: 1px solid rgba(16,185,129,0.2);
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .rec-body.open { display: block; animation: slideDown 0.2s ease; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; height: auto; }
    .sidebar { height: auto; max-height: 280px; }
    .main { padding: 24px 20px; }
    header { padding: 16px 20px; }
    .detail-header h2 { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">📡</div>
  <div>
    <h1>Soluciones Integrales Roaming</h1>
    <p>Selecciona un motivo para ver las soluciones</p>
  </div>
</header>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-label">Motivos de atención</div>
    <div id="motivo-list"></div>
  </aside>

  <main class="main" id="main-content">
    <div class="empty-state">
      <div class="empty-icon">🎯</div>
      <h2>Selecciona un motivo</h2>
      <p>Elige un motivo de atención del panel izquierdo para ver sus soluciones y recomendaciones.</p>
    </div>
  </main>
</div>

<script>
const DATA = [
  {
    motivo: "Compra de paquete Pasaporte Claro",
    contacto: "Se comunica el usuario",
    soluciones: [
      {
        label: "Solución Alternativa 1",
        tipo: "alternativa",
        contenido: "Primero valida: ¿Tu cliente cuenta con el App de Mi Claro descargada?\n\nSi la respuesta es sí, puedes guiarlo con la compra del paquete mediante su App."
      },
      {
        label: "Solución Alternativa 2",
        tipo: "alternativa",
        contenido: "¿Qué hacemos si el cliente no cuenta con el App descargado?\n\nValidamos si el titular está junto al usuario. Si la respuesta es positiva, solicitamos que nos comunique con él."
      },
      {
        label: "Solución Alternativa 3",
        tipo: "alternativa",
        contenido: "Si no está junto al titular, no pierdas la esperanza. Aún puedes solicitarle un número de contacto o referencia para poder contactar al titular."
      }
    ],
    recomendacion: "Una vez que concretes la compra con el titular, vuelve a llamar al usuario para confirmar que todo esté operativo."
  },
  {
    motivo: "Limitaciones de saldo, crédito o acceso",
    contacto: "Cliente sin saldo para cobertura internacional",
    soluciones: [
      {
        label: "Solución Alternativa 1",
        tipo: "alternativa",
        contenido: "Ofrecer Paquete Pasaporte Claro."
      },
      {
        label: "Solución Alternativa 2",
        tipo: "alternativa",
        contenido: "Cliente NO acepta Paquete Pasaporte.\n\nOfrecer Límite de consumo adicional (si aplica)."
      },
      {
        label: "Solución Alternativa 3",
        tipo: "alternativa",
        contenido: "Cliente tiene límite adicional pero ya lo consumió.\n\nReforzar Paquete Pasaporte Claro (mejor control de gasto) / Ofrecer cambio de plan con mayor cobertura internacional."
      },
      {
        label: "Solución Alternativa 4",
        tipo: "alternativa",
        contenido: "Cliente SIN límite de crédito suficiente.\n\nBrindar alternativas de pago:\n• Pago con tarjeta de crédito/débito\n• Recarga de saldo"
      },
      {
        label: "Gestión Excepcional",
        tipo: "gestion",
        contenido: "Cliente NO puede recargar ni usar App.\n\n• Evaluar ampliación de límite de crédito\n• Escalar / reportar a Supervisor\n• Proceder con el flujo de atención"
      }
    ],
    recomendacion: "Ofrecer soluciones preventivas al cliente para evitar que vuelva a ocurrir la misma situación."
  },
  {
    motivo: "Migración a prepago",
    contacto: "Cliente se comunica en horario no disponible del área de retenciones, solicitando la migración a prepago porque no utiliza el servicio.",
    paso1: "",
    soluciones: [
      {
        label: "Solución Alternativa 1",
        tipo: "alternativa",
        contenido: "Ofrecerle la devolución de llamada en un horario en que esté atendiendo el área de retenciones para ayudarle con la solicitud."
      },
      {
        label: "Solución Alternativa 2",
        tipo: "alternativa",
        contenido: "Recomendarle y orientarle si tiene instalado el APP Mi Claro, ayudarle paso a paso con la migración por el App Mi Claro."
      },
      {
        label: "Gestión Excepcional",
        tipo: "gestion",
        contenido: "Evaluar y escalar al Supervisor para que, por excepción, se pueda realizar la solicitud."
      }
    ],
    recomendacion: "Ofrecer soluciones preventivas al cliente para evitar que vuelva a ocurrir la misma situación."
  },
  {
    motivo: "Servicio Hogar",
    contacto: "Cliente consulta por su servicio hogar pero indica que cuando le transfieren al otro área la comunicación se corta.",
    paso1: "",
    soluciones: [
      {
        label: "Solución Alternativa 1",
        tipo: "alternativa",
        contenido: "Indicarle al cliente que se va a hacer seguimiento. Si no se llega a transferir de forma correcta al otra área, ofrecerle la devolución de llamada de forma inmediata en caso esta transferencia no se concrete."
      },
      {
        label: "Gestión Excepcional",
        tipo: "gestion",
        contenido: "Ofrecerle que se va a escalar su caso con prioridad y solicitar un teléfono de contacto.\n\nSupervisor debe reportar con el área encargada para que uno del personal se pueda comunicar con el cliente."
      }
    ],
    recomendacion: "Ofrecer soluciones preventivas al cliente para evitar que vuelva a ocurrir la misma situación."
  },
  {
    motivo: "Migración de plan",
    contacto: "Cliente desea cambiar de plan a uno menor pero de forma forzosa.",
    paso1: "",
    soluciones: [
      {
        label: "Solución Alternativa 1",
        tipo: "alternativa",
        contenido: "Primero el asesor deberá aplicar su proceso: que la ejecución del cambio sea para su siguiente ciclo de facturación.\n\nSi el cliente menciona que necesita de forma urgente y no acepta para su siguiente ciclo:"
      },
      {
        label: "Gestión Excepcional",
        tipo: "gestion",
        contenido: "Evaluar y escalar al Supervisor para realizar el cambio de plan a uno menor de forma forzosa."
      }
    ],
    recomendacion: "Ofrecer soluciones preventivas al cliente para evitar que vuelva a ocurrir la misma situación."
  },
  {
    motivo: "Falla de migración a postpago",
    contacto: "Cliente indica que migró a postpago pero no tiene servicio.",
    paso1: "",
    soluciones: [
      {
        label: "Solución Alternativa 1",
        tipo: "alternativa",
        contenido: "Primero valida: ¿El ICCID del chip físico es el mismo que figura en el sistema?\n\nSi la respuesta es NO:\n• Realizar un caso de falla por migración a postpago\n• Solicitar un teléfono de contacto\n• Ofrecerle la devolución de llamada\n• Comprometerse a hacer seguimiento del caso cada vez que se actualice alguna información hasta que se solucione."
      }
    ],
    recomendacion: "Solicitar un teléfono de contacto y ofrecerle la devolución de llamada para confirmar la resolución del caso."
  },
  {
    motivo: "Explicación de recibo",
    contacto: "Cliente menciona que no reconoce los cobros adicionales.",
    paso1: "",
    soluciones: [
      {
        label: "Solución Alternativa 1",
        tipo: "alternativa",
        contenido: "Primero demos aplicar el proceso: detallar el recibo y manejar la llamada."
      },
      {
        label: "Gestión Excepcional",
        tipo: "gestion",
        contenido: "Evaluar si cuenta con IMF y escalar al Supervisor.\n\nOfrecerle por única vez el Ajuste, sujeto a consideraciones según la emoción del cliente."
      }
    ],
    recomendacion: "Consideración: Identificar las emociones del cliente, verificar si cuenta con IMF, y que no tenga descuento previo por el mismo motivo."
  }
];

// Render sidebar
const motivoList = document.getElementById('motivo-list');
DATA.forEach((item, i) => {
  const btn = document.createElement('button');
  btn.className = 'motivo-btn';
  btn.innerHTML = `<span class="num">${i+1}</span><span>${item.motivo}</span>`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.motivo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDetail(item);
  });
  motivoList.appendChild(btn);
});

function renderDetail(item) {
  const main = document.getElementById('main-content');
  
  let paso1HTML = '';
  if (item.paso1 && item.paso1.trim()) {
    paso1HTML = `
      <div class="paso1-box">
        <strong>📋 Paso 1 — Recuerda</strong>
        ${escHtml(item.paso1)}
      </div>`;
  }

  let solutionsHTML = item.soluciones.map((sol, idx) => {
    const badgeClass = sol.tipo === 'gestion' ? 'sol-badge gestion' : 'sol-badge';
    let title = sol.label;
    if (title.toLowerCase().includes("solución alternativa")) {
      title = title.replace(/Solución /i, "");
    }
    const badgeText = sol.tipo === 'gestion' ? '🎯 ' + title : '✦ ' + title;
    return `
      <div class="solution-card">
        <button class="solution-toggle" onclick="toggleSol(this)">
          <span class="${badgeClass}">${badgeText}</span>
          <span class="sol-label"></span>
          <span class="sol-arrow">›</span>
        </button>
        <div class="solution-body">
${escHtml(sol.contenido)}
        </div>
      </div>`;
  }).join('');

  let recHTML = '';
  if (item.recomendacion) {
    recHTML = `
      <div class="section-title">Recomendación final</div>
      <div class="rec-card">
        <button class="rec-toggle" onclick="toggleRec(this)">
          <span class="rec-icon">⭐ Recomendaciones</span>
          <span class="rec-label">Ver recomendación</span>
          <span class="sol-arrow">›</span>
        </button>
        <div class="rec-body">
${escHtml(item.recomendacion)}
        </div>
      </div>`;
  }

  main.innerHTML = `
    <div class="detail-view">
      <div class="detail-header">
        <div class="detail-tag">Motivo de atención</div>
        <h2>${escHtml(item.motivo)}</h2>
        <div class="info-row">
          <div class="info-chip"><span class="icon">👤</span> ${escHtml(item.contacto)}</div>
        </div>
      </div>

      ${paso1HTML}

      <div class="section-title">Posibles soluciones</div>
      <div class="solutions-grid">
        ${solutionsHTML}
      </div>

      ${recHTML}
    </div>`;
}

function toggleSol(btn) {
  const body = btn.nextElementSibling;
  const isOpen = btn.classList.contains('open');
  // Close all in same grid
  btn.closest('.solutions-grid').querySelectorAll('.solution-toggle').forEach(b => {
    b.classList.remove('open');
    b.nextElementSibling.classList.remove('open');
  });
  if (!isOpen) {
    btn.classList.add('open');
    body.classList.add('open');
  }
}

function toggleRec(btn) {
  const body = btn.nextElementSibling;
  btn.classList.toggle('open');
  body.classList.toggle('open');
}



function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
